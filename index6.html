<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ Secure Image Ownership Proofer</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#28a745">
    
    <!-- SUPABASE LIBRARY -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- QR LIBRARY -->
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 0 auto; padding: 15px; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; }
        .app-container { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; position: relative;}
        .lang-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 10px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.8em; transition: 0.3s; z-index: 10;}
        .lang-btn:hover { background: white; color: #1e3c72; }
        .header { background: linear-gradient(135deg, #28a745, #20c997); color: white; padding: 25px 15px; text-align: center; position: relative;}
        .header h1 { font-size: 1.8em; margin-bottom: 5px; }
        .tab-header { display: flex; background: #f8f9fa; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; border: none; background: transparent; font-weight: bold; color: #6c757d; font-size: 0.95em; transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn:hover { color: #333; background: #f1f1f1; }
        .tab-btn.active { color: #28a745; border-bottom: 3px solid #28a745; background: white; }
        .tab-content { display: none; padding: 25px; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        h2 { color: #333; margin-bottom: 20px; font-size: 1.3em; display: flex; align-items: center; gap: 10px;}
        .sec-number { background: #28a745; color: white; width: 30px; height: 30px; display: inline-flex; justify-content: center; align-items: center; border-radius: 50%; font-size: 0.9em; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #28a745; box-shadow: 0 0 10px rgba(40,167,69,0.3); }
        button.action-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #28a745, #20c997); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.action-btn:disabled { background: #ccc; cursor: not-allowed; }
        .preview img { max-width: 150px; border-radius: 15px; border: 4px solid #28a745; }
        .result { margin: 20px 0; padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; }
        .success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
        .owner-card { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 20px; border-radius: 15px; margin-top: 15px; text-align: left; }
        .detail { display: flex; justify-content: space-between; margin: 10px 0; font-size: 0.9em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;}
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #dc3545; margin-right: 5px; }
        .status-dot.active { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        .hidden { display: none !important; }
        .reset-btn { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <button id="langToggleBtn" class="lang-btn" onclick="toggleLanguage()">🌐 English</button>
        
        <div class="header">
            <h1 data-key="title">🛡️ Secure Image Proofer</h1>
            <p data-key="subtitle">100% Anti-Theft Protection</p>
            <div class="db-status"><span id="dbDot" class="status-dot"></span> Supabase Connected</div>
        </div>

        <div class="tab-header">
            <button class="tab-btn active" onclick="openTab(event, 'tabAdd')" data-key="tab1">1. Add</button>
            <button class="tab-btn" onclick="openTab(event, 'tabEdit')" data-key="tab2">2. Edit</button>
            <button class="tab-btn" onclick="openTab(event, 'tabVerify')" data-key="tab3">3. Verify</button>
        </div>

        <!-- TAB 1: ADD -->
        <div id="tabAdd" class="tab-content active">
            <h2><span class="sec-number">1</span> <span data-key="addTitle">📤 Add New Ownership</span></h2>
            <div id="addLockedMsg" class="error hidden" data-key="addLockedMsg">⚠️ Image already protected! Use Edit tab.</div>
            <input type="file" id="addImg" accept="image/*">
            <input type="text" id="addName" data-ph="namePh" placeholder="👤 Your Full Name">
            <input type="tel" id="addMobile" data-ph="mobilePh" placeholder="📱 Mobile (10 digits)">
            <input type="text" id="addId" data-ph="idPh" placeholder="🆔 ID Number">
            <button id="addBtn" class="action-btn" disabled data-key="addBtn">Create Secure Image</button>
            <div id="addPreview" class="preview hidden"></div>
            <div id="addResult" class="result hidden"></div>
            <button class="reset-btn" onclick="resetAdd()" data-key="clearBtn">⟳ Clear</button>
        </div>

        <!-- TAB 2: EDIT -->
        <div id="tabEdit" class="tab-content">
            <h2 data-key="editTitle">✏️ Edit Ownership</h2>
            <input type="file" id="editImg" accept="image/*">
            <div id="editUnlockBox" class="hidden">
                <input type="tel" id="unlockMobile" placeholder="📱 Old Mobile">
                <input type="text" id="unlockId" placeholder="🆔 Old ID">
                <button id="unlockBtn" class="action-btn">🔑 Unlock</button>
            </div>
            <div id="editFormBox" class="hidden">
                <input type="text" id="editName" placeholder="👤 New Name">
                <input type="tel" id="editMobile" placeholder="📱 New Mobile">
                <input type="text" id="editId" placeholder="🆔 New ID">
                <button id="editUpdateBtn" class="action-btn">🔄 Update</button>
            </div>
            <div id="editResult" class="result hidden"></div>
            <button class="reset-btn" onclick="resetEdit()" data-key="clearBtn">⟳ Clear</button>
        </div>

        <!-- TAB 3: VERIFY -->
        <div id="tabVerify" class="tab-content">
            <h2 data-key="verifyTitle">🔍 Verify Ownership</h2>
            <input type="file" id="verifyImg" accept="image/*">
            <button id="verifyBtn" class="action-btn" disabled data-key="verifyBtn">✅ Check Owner Details</button>
            <div id="verifyResult" class="hidden"></div>
            <button class="reset-btn" onclick="resetVerify()" data-key="clearBtn">⟳ Clear</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://trchucfdpjqizvdepebb.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_f17wjBRos0UahSTol-SHlQ_4XZyNp0k'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Check Connection
        async function checkDB() {
            try {
                const { error } = await supabaseClient.from('image_ownership').select('count', { count: 'exact', head: true });
                if (!error) document.getElementById('dbDot').classList.add('active');
            } catch(e) { console.error("DB Error", e); }
        }
        checkDB();

        // --- CORE ENGINE (pHash) ---
        function generateImageFingerprint(imgElement) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                canvas.width = 16; canvas.height = 16;
                ctx.drawImage(imgElement, 0, 0, 16, 16);
                const data = ctx.getImageData(0, 0, 16, 16).data;
                let gray = [];
                let avg = 0;
                for (let i = 0; i < data.length; i += 4) {
                    let g = (data[i] * 0.3 + data[i+1] * 0.59 + data[i+2] * 0.11);
                    gray.push(g);
                    avg += g;
                }
                avg /= 256;
                resolve(gray.map(v => v >= avg ? '1' : '0').join(''));
            });
        }

        function getHammingDistance(h1, h2) {
            let dist = 0;
            for (let i = 0; i < h1.length; i++) if (h1[i] !== h2[i]) dist++;
            return dist;
        }

        async function findOwnerInDB(hash) {
            const { data, error } = await supabaseClient.from('image_ownership').select('*');
            if (error || !data) return null;
            return data.find(row => getHammingDistance(hash, row.image_hash) < 35) || null;
        }

        // --- UI LOGIC ---
        function openTab(evt, tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        // --- FUNCTIONALITY: ADD ---
        let tempHash = "";
        document.getElementById('addImg').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const img = new Image();
            img.onload = async () => {
                tempHash = await generateImageFingerprint(img);
                const existing = await findOwnerInDB(tempHash);
                if (existing) {
                    document.getElementById('addLockedMsg').classList.remove('hidden');
                    document.getElementById('addBtn').disabled = true;
                } else {
                    document.getElementById('addLockedMsg').classList.add('hidden');
                    updateAddBtnState();
                }
            };
            img.src = URL.createObjectURL(file);
        };

        const updateAddBtnState = () => {
            const inputs = ['addName', 'addMobile', 'addId'].every(id => document.getElementById(id).value.length > 2);
            document.getElementById('addBtn').disabled = !(tempHash && inputs);
        };
        ['addName', 'addMobile', 'addId'].forEach(id => document.getElementById(id).oninput = updateAddBtnState);

        document.getElementById('addBtn').onclick = async () => {
            const btn = document.getElementById('addBtn');
            btn.disabled = true; btn.innerText = "⏳ Saving...";
            
            const payload = {
                image_hash: tempHash,
                owner_name: document.getElementById('addName').value,
                mobile: document.getElementById('addMobile').value,
                id_number: document.getElementById('addId').value
            };

            const { error } = await supabaseClient.from('image_ownership').insert([payload]);
            
            if (error) {
                alert("Database Error: " + error.message);
                btn.innerText = "Error!";
            } else {
                document.getElementById('addResult').innerHTML = "✅ Secured Successfully!";
                document.getElementById('addResult').className = "result success";
                document.getElementById('addResult').classList.remove('hidden');
                btn.innerText = "Done!";
            }
        };

        // --- FUNCTIONALITY: VERIFY ---
        document.getElementById('verifyImg').onchange = (e) => {
            document.getElementById('verifyBtn').disabled = !e.target.files[0];
        };

        document.getElementById('verifyBtn').onclick = async () => {
            const btn = document.getElementById('verifyBtn');
            const res = document.getElementById('verifyResult');
            btn.disabled = true; btn.innerText = "Searching...";
            
            const img = new Image();
            img.onload = async () => {
                const hash = await generateImageFingerprint(img);
                const owner = await findOwnerInDB(hash);
                
                res.classList.remove('hidden');
                if (owner) {
                    res.innerHTML = `
                        <div class="owner-card">
                            <h3>✅ Verified Owner</h3>
                            <div class="detail"><span>Name:</span> <b>${owner.owner_name}</b></div>
                            <div class="detail"><span>Mobile:</span> <b>******${owner.mobile.slice(-4)}</b></div>
                            <div class="detail"><span>ID:</span> <b>******${owner.id_number.slice(-4)}</b></div>
                        </div>`;
                } else {
                    res.innerHTML = `<div class="result error">❌ No Owner Found in Database</div>`;
                }
                btn.disabled = false; btn.innerText = "Check Again";
            };
            img.src = URL.createObjectURL(document.getElementById('verifyImg').files[0]);
        };

        // --- EDIT LOGIC (Quick Fix) ---
        let editData = null;
        document.getElementById('editImg').onchange = async (e) => {
            const img = new Image();
            img.onload = async () => {
                const hash = await generateImageFingerprint(img);
                editData = await findOwnerInDB(hash);
                if(editData) document.getElementById('editUnlockBox').classList.remove('hidden');
                else alert("Image not registered!");
            };
            img.src = URL.createObjectURL(e.target.files[0]);
        };

        document.getElementById('unlockBtn').onclick = () => {
            if(document.getElementById('unlockMobile').value === editData.mobile) {
                document.getElementById('editUnlockBox').classList.add('hidden');
                document.getElementById('editFormBox').classList.remove('hidden');
            } else { alert("Wrong Mobile Number!"); }
        };

        // --- RESET HELPERS ---
        function resetAdd() { location.reload(); }
        function resetEdit() { location.reload(); }
        function resetVerify() { location.reload(); }

        // --- LANGUAGE TOGGLE ---
        let currentLang = 'hi';
        function toggleLanguage() {
            currentLang = currentLang === 'hi' ? 'en' : 'hi';
            document.getElementById('langToggleBtn').innerText = currentLang === 'hi' ? '🌐 English' : '🌐 Hinglish';
            // Simple key swap logic can be expanded here
        }
    </script>
</body>
</html>
